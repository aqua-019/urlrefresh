<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matty-San, tik-tok god</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Bangers&family=Permanent+Marker&family=Press+Start+2P&family=Rubik+Mono+One&family=Silkscreen&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #06060a;
    --surface: #0c0c12;
    --surface2: #101018;
    --border: #1a1a24;
    --border-hover: #2a2a3a;
    --text: #d4d4de;
    --dim: #55556a;
    --accent: #5b7ff7;
    --accent-dim: #5b7ff715;
    --green: #22c55e;
    --green-dim: #22c55e20;
    --red: #ef4444;
    --red-dim: #ef444415;
    --yellow: #eab308;
    --pink: #f472b6;
    --slider-track: #1a1a28;
    --slider-fill: #5b7ff7;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ====== SJB83 CHAOS LAYER ====== */
  .sjb-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  .sjb {
    position: absolute;
    color: rgba(255,255,255,0.06);
    user-select: none;
    white-space: nowrap;
    animation: sjb-drift 20s linear infinite;
  }

  @keyframes sjb-drift {
    0% { transform: translateY(0) rotate(var(--r)); }
    100% { transform: translateY(-30px) rotate(var(--r)); }
  }

  /* ====== ANIME GIRLS (SVG kawaii) ====== */
  .anime-girl {
    position: fixed;
    z-index: 1;
    pointer-events: none;
    opacity: 0.12;
    filter: drop-shadow(0 0 20px var(--pink));
  }

  .anime-girl.g1 { bottom: 10px; right: 20px; width: 180px; }
  .anime-girl.g2 { bottom: 10px; left: 20px; width: 150px; transform: scaleX(-1); }
  .anime-girl.g3 { top: 60px; right: 40px; width: 100px; opacity: 0.07; }

  /* ====== POPUP ====== */
  .popup-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .popup-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .popup-box {
    background: var(--surface);
    border: 2px solid var(--pink);
    border-radius: 8px;
    padding: 32px 40px;
    text-align: center;
    max-width: 380px;
    transform: scale(0.8);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 60px rgba(244, 114, 182, 0.2);
  }

  .popup-overlay.show .popup-box {
    transform: scale(1);
  }

  .popup-box .popup-emoji {
    font-size: 48px;
    margin-bottom: 12px;
    animation: popup-bounce 0.6s ease infinite alternate;
  }

  @keyframes popup-bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  .popup-box .popup-text {
    font-family: 'Bangers', cursive;
    font-size: 28px;
    color: var(--pink);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .popup-box .popup-sub {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 18px;
  }

  .popup-box .popup-close {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--pink);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 8px 24px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .popup-box .popup-close:hover { opacity: 0.8; }

  /* ====== MAIN CONTAINER ====== */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 16px;
    position: relative;
    z-index: 10;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    position: relative;
  }

  .header-left h1 {
    font-family: 'Bangers', cursive;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--pink);
    line-height: 1;
    text-shadow: 0 0 30px rgba(244, 114, 182, 0.3);
  }

  .header-left h1 .god {
    color: var(--accent);
  }

  .header-left .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-top: 4px;
    font-weight: 300;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--dim);
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease infinite;
  }

  .dot.off {
    background: var(--yellow);
    animation: none;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* INPUT BAR */
  .input-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .input-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }

  .input-bar input:focus { border-color: var(--accent); }
  .input-bar input::placeholder { color: var(--dim); }

  .btn {
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.12s;
    background: var(--surface);
    color: var(--text);
    white-space: nowrap;
    user-select: none;
  }

  .btn:hover { border-color: var(--accent); background: var(--accent-dim); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { color: var(--red); border-color: transparent; background: transparent; }
  .btn.danger:hover { background: var(--red-dim); }
  .btn.sm { padding: 4px 10px; font-size: 10px; }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  .toolbar .count {
    margin-left: auto;
    font-size: 10px;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
  }

  /* BULK IMPORT */
  .bulk-toggle {
    font-size: 10px;
    color: var(--dim);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    padding: 4px 0;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .bulk-toggle:hover { color: var(--text); }

  .bulk-area {
    display: none;
    margin-bottom: 12px;
  }

  .bulk-area.open { display: block; }

  .bulk-area textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: inherit;
    font-size: 11px;
    border-radius: 3px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  .bulk-area textarea:focus { border-color: var(--accent); }
  .bulk-area textarea::placeholder { color: var(--dim); }

  .bulk-area .bulk-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  /* URL LIST */
  .url-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .url-item {
    display: grid;
    grid-template-columns: 28px 1fr 100px 42px 62px 28px;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--surface);
    border-radius: 2px;
    border: 1px solid transparent;
    transition: border-color 0.12s;
    min-height: 38px;
  }

  .url-item:hover { border-color: var(--border); }

  .url-item .idx {
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .url-item .url-text {
    font-size: 11px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  /* SLIDER */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .slider-wrap input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 60px;
    height: 3px;
    background: var(--slider-track);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .slider-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }

  .slider-wrap input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }

  .slider-wrap input[type="range"]::-moz-range-thumb {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }

  .slider-wrap .rate-label {
    font-size: 9px;
    color: var(--dim);
    min-width: 30px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* COUNTDOWN + TIMESTAMP */
  .url-item .cd {
    font-size: 10px;
    color: var(--accent);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .url-item .ts {
    font-size: 9px;
    color: var(--dim);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .url-item .remove-btn {
    font-size: 10px;
    color: var(--dim);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    padding: 2px;
    text-align: center;
    border-radius: 2px;
    transition: all 0.1s;
  }

  .url-item .remove-btn:hover { color: var(--red); background: var(--red-dim); }

  .url-item.flash { animation: row-flash 0.3s ease; }
  @keyframes row-flash {
    0% { background: var(--green-dim); }
    100% { background: var(--surface); }
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--dim);
    font-size: 11px;
    line-height: 2;
    border: 1px dashed var(--border);
    border-radius: 3px;
  }

  /* HIDDEN */
  .frame-pool { display: none; }

  /* RESPONSIVE */
  @media (max-width: 680px) {
    .url-item {
      grid-template-columns: 24px 1fr 42px 28px;
      gap: 6px;
    }
    .url-item .slider-wrap,
    .url-item .ts { display: none; }
    .container { padding: 14px 10px; }
    .anime-girl.g1 { width: 120px; }
    .anime-girl.g2 { width: 100px; }
    .anime-girl.g3 { display: none; }
    .header-left h1 { font-size: 20px; }
  }
</style>
</head>

(() => {
  'use strict';

  // ====== SJB83 CHAOS GENERATOR ======
  const sjbFonts = [
    "'Bangers', cursive",
    "'Permanent Marker', cursive",
    "'Press Start 2P', monospace",
    "'Rubik Mono One', monospace",
    "'Silkscreen', monospace",
    "'JetBrains Mono', monospace",
    "serif",
    "Impact, sans-serif",
  ];

  const sjbTexts = ['SJB83', 'SJB83', 'SJB83', 'sjb83', 'S J B 8 3', 'SJB·83', '§JB83', 'SJB⚡83'];

  function spawnSJB() {
    const layer = document.getElementById('sjbLayer');
    const count = 30 + Math.floor(Math.random() * 15);

    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'sjb';
      el.textContent = sjbTexts[Math.floor(Math.random() * sjbTexts.length)];

      const font = sjbFonts[Math.floor(Math.random() * sjbFonts.length)];
      const size = 10 + Math.random() * 50;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const rot = -45 + Math.random() * 90;
      const opacity = 0.02 + Math.random() * 0.06;

      el.style.cssText = `
        font-family: ${font};
        font-size: ${size}px;
        left: ${x}%;
        top: ${y}%;
        --r: ${rot}deg;
        transform: rotate(${rot}deg);
        opacity: ${opacity};
        animation-duration: ${15 + Math.random() * 20}s;
        animation-delay: ${-Math.random() * 20}s;
      `;

      // Some extra large dramatic ones
      if (Math.random() < 0.08) {
        el.style.fontSize = (80 + Math.random() * 60) + 'px';
        el.style.opacity = String(0.015 + Math.random() * 0.025);
        el.style.fontWeight = '900';
      }

      layer.appendChild(el);
    }
  }

  spawnSJB();

  // ====== POPUP ======
  const $popup = document.getElementById('popup');

  function showPopup() {
    $popup.classList.add('show');
  }

  window.closePopup = function() {
    $popup.classList.remove('show');
  };

  // ====== STATE ======
  const state = {
    entries: [],
    globalPaused: false,
    idCounter: 0,
  };

  // ====== DOM REFS ======
  const $input     = document.getElementById('urlInput');
  const $list      = document.getElementById('urlList');
  const $empty     = document.getElementById('emptyState');
  const $pool      = document.getElementById('framePool');
  const $pauseBtn  = document.getElementById('pauseBtn');
  const $dot       = document.getElementById('globalDot');
  const $gStatus   = document.getElementById('globalStatus');
  const $count     = document.getElementById('countLabel');
  const $bulkArea  = document.getElementById('bulkArea');
  const $bulkInput = document.getElementById('bulkInput');

  $input.addEventListener('keydown', e => { if (e.key === 'Enter') addUrl(); });

  // ====== HELPERS ======
  function norm(u) {
    u = u.trim();
    if (!u) return '';
    if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }

  function fmtInterval(v) {
    return v < 1 ? v.toFixed(1) + 's' : v.toFixed(0) + 's';
  }

  function fmtTime(d) {
    if (!d) return '\u2014';
    return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  // ====== CORE ACTIONS ======
  window.addUrl = function() {
    const url = norm($input.value);
    if (!url) return;
    if (state.entries.length >= 100) return;
    if (state.entries.some(e => e.url === url)) return;
    pushEntry(url);
    $input.value = '';
    $input.focus();
    showPopup();
    setTimeout(() => { $popup.classList.remove('show'); }, 2200);
  };

  function pushEntry(url, interval = 15) {
    const now = Date.now();
    state.entries.push({
      id: ++state.idCounter,
      url,
      interval,
      lastRefresh: null,
      nextRefresh: now + interval * 1000,
    });
    render();
  }

  window.removeEntry = function(id) {
    const idx = state.entries.findIndex(e => e.id === id);
    if (idx > -1) {
      const e = state.entries[idx];
      const frame = document.getElementById('f-' + e.id);
      if (frame) frame.remove();
      state.entries.splice(idx, 1);
      render();
    }
  };

  window.clearAll = function() {
    state.entries = [];
    $pool.innerHTML = '';
    render();
  };

  window.togglePause = function() {
    state.globalPaused = !state.globalPaused;
    $pauseBtn.textContent = state.globalPaused ? 'Resume All' : 'Pause All';
    $dot.className = state.globalPaused ? 'dot off' : 'dot';
    $gStatus.textContent = state.globalPaused ? 'paused' : 'running';

    if (!state.globalPaused) {
      const now = Date.now();
      state.entries.forEach(e => {
        e.nextRefresh = now + e.interval * 1000;
      });
    }
  };

  window.toggleBulk = function() {
    $bulkArea.classList.toggle('open');
    if ($bulkArea.classList.contains('open')) $bulkInput.focus();
  };

  window.bulkAdd = function() {
    const lines = $bulkInput.value.split('\n');
    let added = 0;
    for (const line of lines) {
      if (state.entries.length >= 100) break;
      const url = norm(line);
      if (!url) continue;
      if (state.entries.some(e => e.url === url)) continue;
      pushEntry(url);
      added++;
    }
    $bulkInput.value = '';
    $bulkArea.classList.remove('open');
    render();
    if (added > 0) {
      showPopup();
      setTimeout(() => { $popup.classList.remove('show'); }, 2200);
    }
  };

  window.onSlider = function(id, val) {
    const entry = state.entries.find(e => e.id === id);
    if (!entry) return;
    const v = parseFloat(val);
    entry.interval = v;
    entry.nextRefresh = Date.now() + v * 1000;
    const label = document.getElementById('rl-' + id);
    if (label) label.textContent = fmtInterval(v);
  };

  // ====== REFRESH ENGINE (single rAF loop) ======
  function refreshEntry(entry) {
    const fid = 'f-' + entry.id;
    let frame = document.getElementById(fid);
    if (frame) frame.remove();

    frame = document.createElement('iframe');
    frame.id = fid;
    frame.src = entry.url;
    $pool.appendChild(frame);

    entry.lastRefresh = new Date();
    entry.nextRefresh = Date.now() + entry.interval * 1000;

    const row = document.getElementById('row-' + entry.id);
    if (row) {
      row.classList.remove('flash');
      void row.offsetWidth;
      row.classList.add('flash');

      const ts = row.querySelector('.ts');
      if (ts) ts.textContent = fmtTime(entry.lastRefresh);
    }
  }

  function tick() {
    if (!state.globalPaused) {
      const now = Date.now();
      for (const entry of state.entries) {
        if (now >= entry.nextRefresh) {
          refreshEntry(entry);
        }
        const cd = document.getElementById('cd-' + entry.id);
        if (cd) {
          const remaining = Math.max(0, ((entry.nextRefresh - now) / 1000));
          cd.textContent = remaining < 1 ? remaining.toFixed(1) : remaining.toFixed(0);
        }
      }
    }
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  // ====== RENDER ======
  function render() {
    $count.textContent = state.entries.length + ' / 100';
    $empty.style.display = state.entries.length ? 'none' : 'block';

    $list.innerHTML = state.entries.map((e, i) => {
      const sliderVal = intervalToSlider(e.interval);

      return `<div class="url-item" id="row-${e.id}">
        <span class="idx">${String(i + 1).padStart(2, '0')}</span>
        <span class="url-text" title="${e.url}">${e.url}</span>
        <div class="slider-wrap">
          <input type="range" min="0" max="100" step="1" value="${sliderVal}"
            oninput="onSlider(${e.id}, sliderToInterval(this.value))" />
          <span class="rate-label" id="rl-${e.id}">${fmtInterval(e.interval)}</span>
        </div>
        <span class="cd" id="cd-${e.id}">\u2014</span>
        <span class="ts">${fmtTime(e.lastRefresh)}</span>
        <button class="remove-btn" onclick="removeEntry(${e.id})">✕</button>
      </div>`;
    }).join('');
  }

  // ====== SLIDER <-> INTERVAL (log scale) ======
  const MIN_INT = 0.1;
  const MAX_INT = 15;
  const LOG_MIN = Math.log(MIN_INT);
  const LOG_MAX = Math.log(MAX_INT);

  window.sliderToInterval = function(sliderVal) {
    const t = sliderVal / 100;
    const v = Math.exp(LOG_MIN + t * (LOG_MAX - LOG_MIN));
    if (v < 1) return Math.round(v * 10) / 10;
    return Math.round(v * 2) / 2;
  };

  function intervalToSlider(interval) {
    const t = (Math.log(interval) - LOG_MIN) / (LOG_MAX - LOG_MIN);
    return Math.round(t * 100);
  }

  // Initial render
  render();
})();
</script>
</body>
</html>
